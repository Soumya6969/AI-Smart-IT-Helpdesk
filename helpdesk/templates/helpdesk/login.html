{% extends 'helpdesk/base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-lg-5">

<div class="card shadow-lg p-4">

<h2 class="text-center mb-4">

Welcome Back

</h2>

{% if messages %}

{% for message in messages %}

<div class="alert alert-info">

{{ message }}

</div>

{% endfor %}

{% endif %}

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<input
type="text"
name="username"
class="form-control"
placeholder="Username"
required>

</div>

<div class="mb-3">

<input
type="password"
name="password"
class="form-control"
placeholder="Password"
required>

</div>

<button
class="btn btn-primary w-100">

Login

</button>

</form>

<div class="text-center mt-3">

Don't have an account?

<a href="{% url 'register' %}">

Register

</a>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
