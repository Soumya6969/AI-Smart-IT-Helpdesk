{% extends 'helpdesk/base.html' %}

{% block title %}

Edit Ticket

{% endblock %}

{% block content %}

<div class="container">

<div class="card shadow">

<div class="card-header bg-warning">

<h3>

✏ Edit Ticket

</h3>

</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button
class="btn btn-success">

Save Changes

</button>

<a
href="{% url 'ticket_detail' ticket.id %}"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

{% endblock %}
